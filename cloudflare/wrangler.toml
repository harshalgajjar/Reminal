name = "reminal-relay"
main = "src/index.ts"
compatibility_date = "2024-11-01"
compatibility_flags = ["nodejs_compat"]
# Pinned so `wrangler deploy` errors out instead of silently shipping
# to whichever Cloudflare account happens to be logged in. Belongs to
# harshalg98@gmail.com (the everything-account).
account_id = "0cd85a1166e44b17571b7457040d18ae"

[durable_objects]
bindings = [
  { name = "SESSION", class_name = "SessionRoom" },
  { name = "RENDEZVOUS", class_name = "RendezvousRoom" }
]

[[migrations]]
tag = "v1"
new_sqlite_classes = ["SessionRoom"]

[[migrations]]
tag = "v2"
new_sqlite_classes = ["RendezvousRoom"]

[assets]
directory = "./public"
binding = "ASSETS"

[vars]
# Version below which reminal clients FORCE an upgrade (served at /version). Set
# to the fixed version when shipping a security/critical release, then `wrangler
# deploy` — clients pick it up on their next ≤24h check and upgrade automatically
# (no `--force`). Leave "" for normal (prompt-only) releases.
CRITICAL_MIN = ""
