name = "reminal-relay"
main = "src/index.ts"
compatibility_date = "2024-11-01"
compatibility_flags = ["nodejs_compat"]

[durable_objects]
bindings = [
  { name = "SESSION", class_name = "SessionRoom" }
]

[[migrations]]
tag = "v1"
new_sqlite_classes = ["SessionRoom"]

[assets]
directory = "./public"
binding = "ASSETS"
