<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>reminal</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/css/xterm.min.css">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0d1117;
      color: #e6edf3;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }
    header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 16px;
      border-bottom: 1px solid #21262d;
      background: #161b22;
      flex-wrap: wrap;
    }
    header h1 { font-size: 15px; font-weight: 600; }
    header h1 span { color: #58a6ff; }
    #session-form { display: flex; gap: 8px; margin-left: auto; flex-wrap: wrap; }
    input {
      background: #0d1117;
      border: 1px solid #30363d;
      border-radius: 6px;
      color: #e6edf3;
      font-size: 14px;
      padding: 6px 10px;
    }
    #session-input { width: 120px; text-transform: uppercase; letter-spacing: 0.1em; }
    #pin-input { width: 88px; letter-spacing: 0.15em; font-variant-numeric: tabular-nums; }
    input:focus { outline: none; border-color: #58a6ff; }
    button {
      background: #238636;
      border: none;
      border-radius: 6px;
      color: #fff;
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
      padding: 6px 14px;
    }
    button:hover { background: #2ea043; }
    button:disabled { background: #21262d; color: #484f58; cursor: not-allowed; }
    button.danger { background: #da3633; }
    button.danger:hover { background: #f85149; }
    #status { font-size: 13px; color: #8b949e; display: flex; align-items: center; gap: 6px; }
    #status.connected { color: #3fb950; }
    #status.warn { color: #d29922; }
    #status.error { color: #f85149; }
    #status::before {
      content: '';
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: currentColor;
      opacity: 0.5;
    }
    #status.connecting::before { animation: pulse 1.2s ease-in-out infinite; }
    @keyframes pulse {
      0%, 100% { opacity: 0.25; }
      50% { opacity: 1; }
    }
    #terminal-wrap { flex: 1; padding: 8px; overflow: hidden; position: relative; }
    #terminal { height: 100%; }
    .xterm { height: 100%; }
    #overlay {
      position: absolute;
      inset: 8px;
      background: rgba(13, 17, 23, 0.55);
      backdrop-filter: blur(2px);
      display: none;
      align-items: center;
      justify-content: center;
      color: #e6edf3;
      font-size: 14px;
      pointer-events: none;
      border-radius: 4px;
    }
    #overlay.visible { display: flex; }
    #overlay span { background: #161b22; border: 1px solid #30363d; padding: 8px 16px; border-radius: 6px; }
  </style>
</head>
<body>
  <header>
    <h1><span>re</span>minal</h1>
    <div id="session-form">
      <input id="session-input" placeholder="Session" maxlength="8" autocomplete="off" spellcheck="false">
      <input id="pin-input" placeholder="PIN" maxlength="8" inputmode="numeric" autocomplete="off" spellcheck="false">
      <button id="connect-btn">Connect</button>
    </div>
    <div id="status" class="">Session + PIN required</div>
  </header>
  <div id="terminal-wrap">
    <div id="terminal"></div>
    <div id="overlay"><span id="overlay-text">Connecting…</span></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/lib/xterm.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@xterm/addon-fit@0.10.0/lib/addon-fit.min.js"></script>
  <script>
    const statusEl = document.getElementById('status');
    const sessionInput = document.getElementById('session-input');
    const pinInput = document.getElementById('pin-input');
    const connectBtn = document.getElementById('connect-btn');
    const overlay = document.getElementById('overlay');
    const overlayText = document.getElementById('overlay-text');

    const params = new URLSearchParams(location.search);
    const initialSession = params.get('s') || '';
    if (initialSession) sessionInput.value = initialSession.toUpperCase();

    // The PIN may arrive in the URL fragment (e.g. #p=123456) from the
    // QR code printed by the agent. Fragments never leave the browser, so
    // this is safer than putting the PIN in the query string. We strip the
    // fragment from the URL bar after reading it.
    const hashParams = new URLSearchParams(location.hash.replace(/^#/, ''));
    let initialPin = hashParams.get('p') || '';
    if (initialPin) {
      pinInput.value = initialPin;
      history.replaceState(null, '', location.pathname + location.search);
    }

    // Restore the PIN from sessionStorage if we previously authed this same
    // session in this tab. Refresh now Just Works without re-prompting.
    // sessionStorage (vs localStorage) means the credential dies with the
    // tab, matching the user's intent — closing the tab is "I'm done."
    const CRED_KEY = 'reminal:cred';
    function loadStoredCred(sessionId) {
      if (!sessionId) return '';
      try {
        const raw = sessionStorage.getItem(CRED_KEY);
        if (!raw) return '';
        const c = JSON.parse(raw);
        if (c && c.session === sessionId.toUpperCase() && typeof c.pin === 'string') {
          return c.pin;
        }
      } catch (_) {}
      return '';
    }
    function saveCred(sessionId, pin) {
      try {
        sessionStorage.setItem(CRED_KEY, JSON.stringify({ session: sessionId.toUpperCase(), pin: pin }));
      } catch (_) {}
    }
    function clearCred() {
      try { sessionStorage.removeItem(CRED_KEY); } catch (_) {}
    }
    if (!initialPin) {
      const stored = loadStoredCred(initialSession);
      if (stored) {
        pinInput.value = stored;
        initialPin = stored;
      }
    }

    const term = new Terminal({
      cursorBlink: true,
      fontFamily: 'Menlo, Monaco, "Courier New", monospace',
      fontSize: 14,
      scrollback: 10000,
      theme: {
        background: '#0d1117', foreground: '#e6edf3', cursor: '#58a6ff',
        selectionBackground: '#264f78',
      },
    });
    const fitAddon = new FitAddon.FitAddon();
    term.loadAddon(fitAddon);
    term.open(document.getElementById('terminal'));
    fitAddon.fit();

    // Connection state machine
    let ws = null;
    let cryptoKey = null;
    let authed = false;       // received auth_ok
    let agentLive = false;    // agent is currently connected on the relay
    let lastSeq = 0;          // highest seq we've received from agent
    let sessionId = '';
    let pinValue = '';
    let manualClose = false;  // user clicked Disconnect; do not auto-reconnect
    let fatal = false;        // unrecoverable (bad PIN, session expired); do not auto-reconnect
    let reconnectTimer = null;
    let backoffMs = 1000;
    const MAX_BACKOFF_MS = 30000;
    let connectedAt = 0;
    // helloShown gates the one-time "Connected · AES-256-GCM end-to-end" line
    // written into the terminal; bytesSent/Received feed the summary line on
    // disconnect. Mirrors the terminal viewer's helloOnce + counters.
    let helloShown = false;
    let bytesSent = 0;
    let bytesReceived = 0;

    function humanBytes(n) {
      if (n < 1000) return n + ' B';
      if (n < 1000000) return (n / 1000).toFixed(2) + ' KB';
      if (n < 1000000000) return (n / 1000000).toFixed(2) + ' MB';
      return (n / 1000000000).toFixed(2) + ' GB';
    }

    async function deriveKey(sessionId, pin) {
      const enc = new TextEncoder();
      const baseKey = await crypto.subtle.importKey(
        'raw', enc.encode(pin), 'HKDF', false, ['deriveBits']
      );
      const bits = await crypto.subtle.deriveBits(
        {
          name: 'HKDF',
          hash: 'SHA-256',
          salt: enc.encode(sessionId.toUpperCase()),
          info: enc.encode('reminal-v1'),
        },
        baseKey,
        256
      );
      return crypto.subtle.importKey('raw', bits, { name: 'AES-GCM' }, false, ['encrypt', 'decrypt']);
    }

    async function encrypt(key, data) {
      const bytes = typeof data === 'string' ? new TextEncoder().encode(data) : data;
      const nonce = crypto.getRandomValues(new Uint8Array(12));
      const ct = await crypto.subtle.encrypt({ name: 'AES-GCM', iv: nonce }, key, bytes);
      const out = new Uint8Array(nonce.length + ct.byteLength);
      out.set(nonce);
      out.set(new Uint8Array(ct), nonce.length);
      return btoa(String.fromCharCode(...out));
    }

    async function decrypt(key, encoded) {
      const raw = Uint8Array.from(atob(encoded), c => c.charCodeAt(0));
      const nonce = raw.slice(0, 12);
      const ct = raw.slice(12);
      const pt = await crypto.subtle.decrypt({ name: 'AES-GCM', iv: nonce }, key, ct);
      return new Uint8Array(pt);
    }

    function relayURL(sessionId) {
      const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
      return proto + '//' + location.host + '/ws/' + sessionId.toUpperCase() + '/viewer';
    }

    function setStatus(text, cls) {
      statusEl.textContent = text;
      statusEl.className = cls || '';
    }

    function showOverlay(text) {
      overlayText.textContent = text;
      overlay.classList.add('visible');
    }

    function hideOverlay() {
      overlay.classList.remove('visible');
    }

    function setBtnConnect() {
      connectBtn.textContent = 'Connect';
      connectBtn.disabled = false;
      connectBtn.classList.remove('danger');
    }

    function setBtnDisconnect() {
      connectBtn.textContent = 'Disconnect';
      connectBtn.disabled = false;
      connectBtn.classList.add('danger');
    }

    function setBtnBusy(label) {
      connectBtn.textContent = label;
      connectBtn.disabled = true;
      connectBtn.classList.remove('danger');
    }

    async function send(msg) {
      if (!ws || ws.readyState !== WebSocket.OPEN) return;
      if (authed && cryptoKey && (msg.type === 'data' || msg.type === 'resize')) {
        if (msg.type === 'data') {
          msg = { type: 'data', data: await encrypt(cryptoKey, Uint8Array.from(atob(msg.data), c => c.charCodeAt(0))) };
        } else {
          const payload = JSON.stringify({ cols: msg.cols, rows: msg.rows });
          msg = { type: 'resize', data: await encrypt(cryptoKey, payload) };
        }
      }
      ws.send(JSON.stringify(msg));
    }

    function sendResize() {
      send({ type: 'resize', cols: term.cols, rows: term.rows });
    }

    function sendResume() {
      if (!ws || ws.readyState !== WebSocket.OPEN) return;
      ws.send(JSON.stringify({ type: 'resume', from_seq: lastSeq }));
    }

    function cancelReconnect() {
      if (reconnectTimer !== null) {
        clearTimeout(reconnectTimer);
        reconnectTimer = null;
      }
    }

    function scheduleReconnect() {
      cancelReconnect();
      if (manualClose || fatal) return;
      // Reset backoff if the previous session stayed up for a while.
      if (connectedAt && (Date.now() - connectedAt) > 30000) {
        backoffMs = 1000;
      }
      const delay = Math.min(backoffMs, MAX_BACKOFF_MS);
      const secs = Math.max(1, Math.round(delay / 1000));
      setStatus('Reconnecting in ' + secs + 's…', 'warn connecting');
      showOverlay('Reconnecting in ' + secs + 's…');
      reconnectTimer = setTimeout(() => {
        reconnectTimer = null;
        openSocket();
      }, delay);
      backoffMs = Math.min(backoffMs * 2, MAX_BACKOFF_MS);
    }

    async function startConnect() {
      const s = sessionInput.value.trim().toUpperCase();
      const p = pinInput.value.trim();
      if (!s || !p) { setStatus('Session and PIN required', 'error'); return; }
      if (!/^\d{6,8}$/.test(p)) { setStatus('PIN must be 6–8 digits', 'error'); return; }

      manualClose = false;
      fatal = false;
      backoffMs = 1000;
      // Switching to a different session invalidates the replay cursor and
      // any previously rendered output; start the terminal clean.
      if (s !== sessionId) {
        lastSeq = 0;
        sessionId = s;
        term.reset();
      }
      pinValue = p;
      cryptoKey = await deriveKey(sessionId, pinValue);
      sessionInput.value = sessionId;
      history.replaceState(null, '', '?s=' + sessionId);
      openSocket();
    }

    function openSocket() {
      cancelReconnect();
      if (ws) { try { ws.close(); } catch (_) {} ws = null; }
      authed = false;
      agentLive = false;

      const fresh = lastSeq === 0;
      setStatus(fresh ? 'Connecting…' : 'Reconnecting…', 'warn connecting');
      showOverlay(fresh ? 'Connecting…' : 'Reconnecting…');
      setBtnBusy('Cancel');
      // Allow user to cancel during connect by re-purposing the button.
      connectBtn.disabled = false;
      connectBtn.classList.add('danger');
      connectBtn.textContent = 'Cancel';

      ws = new WebSocket(relayURL(sessionId));

      ws.onopen = () => {
        ws.send(JSON.stringify({ type: 'auth', pin: pinValue }));
      };

      ws.onmessage = async (ev) => {
        let msg;
        try { msg = JSON.parse(ev.data); } catch { return; }
        await handleMessage(msg);
      };

      ws.onclose = () => {
        authed = false;
        agentLive = false;
        ws = null;
        if (manualClose) {
          setStatus('Disconnected');
          hideOverlay();
          setBtnConnect();
          return;
        }
        if (fatal) {
          // Status already set by error handler.
          hideOverlay();
          setBtnConnect();
          return;
        }
        scheduleReconnect();
      };

      ws.onerror = () => {
        // ws.onclose will run after this; let it drive reconnect logic.
      };
    }

    async function handleMessage(msg) {
      switch (msg.type) {
        case 'auth_ok':
          authed = true;
          // Auth succeeded — remember the PIN for this tab so a refresh
          // doesn't bounce the user back to the login form.
          saveCred(sessionId, pinValue);
          break;
        case 'connected':
        case 'agent_online':
          agentLive = true;
          connectedAt = Date.now();
          backoffMs = 1000;
          setStatus('Connected to ' + sessionId, 'connected');
          hideOverlay();
          setBtnDisconnect();
          if (!helloShown) {
            helloShown = true;
            term.write('\x1b[2m[reminal] Connected to ' + sessionId + ' · AES-256-GCM end-to-end\x1b[0m\r\n');
          }
          sendResume();
          fitAddon.fit();
          sendResize();
          term.focus();
          break;
        case 'agent_offline':
          agentLive = false;
          setStatus('Agent offline — waiting…', 'warn connecting');
          showOverlay('Agent offline — waiting for it to reconnect…');
          // Keep the WS open; the relay will tell us when the agent is back.
          setBtnDisconnect();
          break;
        case 'data': {
          if (!cryptoKey) break;
          try {
            const bytes = await decrypt(cryptoKey, msg.data);
            if (typeof msg.seq === 'number' && msg.seq > lastSeq) lastSeq = msg.seq;
            term.write(bytes);
            bytesReceived += bytes.byteLength;
          } catch (_) { /* decrypt failure: skip */ }
          break;
        }
        case 'closed':
          fatal = true;
          clearCred();
          setStatus(msg.error || 'Session ended', 'error');
          term.write('\r\n\x1b[31m' + (msg.error || 'Session ended') + '\x1b[0m\r\n');
          break;
        case 'error':
          fatal = true;
          clearCred();
          setStatus(msg.error || 'Error', 'error');
          term.write('\r\n\x1b[31m' + (msg.error || 'Error') + '\x1b[0m\r\n');
          break;
      }
    }

    function userDisconnect() {
      manualClose = true;
      cancelReconnect();
      clearCred();
      if (ws) { try { ws.close(); } catch (_) {} ws = null; }
      authed = false;
      agentLive = false;
      if (helloShown && connectedAt) {
        const dur = Math.max(1, Math.round((Date.now() - connectedAt) / 1000));
        term.write('\x1b[2m[reminal] Disconnected from ' + sessionId + ' after ' + dur + 's · sent ' + humanBytes(bytesSent) + ' · received ' + humanBytes(bytesReceived) + '\x1b[0m\r\n');
      }
      setStatus('Disconnected');
      hideOverlay();
      setBtnConnect();
    }

    term.onData(async (data) => {
      if (!agentLive) return; // typing into nothing while agent is offline
      const bytes = new TextEncoder().encode(data);
      let binary = '';
      bytes.forEach(b => binary += String.fromCharCode(b));
      await send({ type: 'data', data: btoa(binary) });
      bytesSent += bytes.byteLength;
    });

    window.addEventListener('resize', () => { fitAddon.fit(); if (agentLive) sendResize(); });
    connectBtn.addEventListener('click', () => {
      // Three button modes:
      //   - "Connect" (idle/disconnected): start a new connection
      //   - "Cancel" (connecting/reconnecting): abort and stay disconnected
      //   - "Disconnect" (connected): manually close
      if (!ws && !reconnectTimer) {
        startConnect();
      } else {
        userDisconnect();
      }
    });
    sessionInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') startConnect(); });
    pinInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') startConnect(); });

    // If the QR code provided both session and PIN, just connect.
    if (initialSession && initialPin) {
      startConnect();
    } else if (initialSession) {
      pinInput.focus();
    }

    // If the page is closed/refreshed, close the WS cleanly.
    window.addEventListener('beforeunload', () => {
      manualClose = true;
      if (ws) try { ws.close(); } catch (_) {}
    });
  </script>
</body>
</html>
