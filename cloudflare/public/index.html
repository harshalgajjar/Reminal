<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>reminal</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/css/xterm.min.css">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0d1117;
      color: #e6edf3;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }
    header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 16px;
      border-bottom: 1px solid #21262d;
      background: #161b22;
      flex-wrap: wrap;
    }
    header h1 { font-size: 15px; font-weight: 600; }
    header h1 span { color: #58a6ff; }
    #session-form { display: flex; gap: 8px; margin-left: auto; flex-wrap: wrap; }
    input {
      background: #0d1117;
      border: 1px solid #30363d;
      border-radius: 6px;
      color: #e6edf3;
      /* 16px+ on iOS Safari prevents the auto-zoom-on-focus that turns
         tapping the PIN box into a viewport jump. */
      font-size: 16px;
      padding: 6px 10px;
    }
    #session-input { width: 120px; text-transform: uppercase; letter-spacing: 0.1em; }
    #pin-input { width: 88px; letter-spacing: 0.15em; font-variant-numeric: tabular-nums; }
    input:focus { outline: none; border-color: #58a6ff; }
    button {
      background: #238636;
      border: none;
      border-radius: 6px;
      color: #fff;
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
      padding: 6px 14px;
    }
    button:hover { background: #2ea043; }
    button:disabled { background: #21262d; color: #484f58; cursor: not-allowed; }
    button.danger { background: #da3633; }
    button.danger:hover { background: #f85149; }
    #status { font-size: 13px; color: #8b949e; display: flex; align-items: center; gap: 6px; }
    #status.connected { color: #3fb950; }
    #status.warn { color: #d29922; }
    #status.error { color: #f85149; }
    #status::before {
      content: '';
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: currentColor;
      opacity: 0.5;
    }
    #status.connecting::before { animation: pulse 1.2s ease-in-out infinite; }
    @keyframes pulse {
      0%, 100% { opacity: 0.25; }
      50% { opacity: 1; }
    }
    #terminal-wrap { flex: 1; padding: 8px; overflow: hidden; position: relative; }
    #terminal { height: 100%; }
    .xterm { height: 100%; }
    #overlay {
      position: absolute;
      inset: 8px;
      background: rgba(13, 17, 23, 0.55);
      backdrop-filter: blur(2px);
      display: none;
      align-items: center;
      justify-content: center;
      color: #e6edf3;
      font-size: 14px;
      pointer-events: none;
      border-radius: 4px;
    }
    #overlay.visible { display: flex; }
    #overlay span { background: #161b22; border: 1px solid #30363d; padding: 8px 16px; border-radius: 6px; }

    /* Once connected, the session/PIN inputs are dead weight — collapse
       them to reclaim screen real estate (a big deal on phones). The
       Connect button stays visible (it doubles as Disconnect when live). */
    body.connected #session-form input { display: none; }

    /* Mobile-only soft-key bar. Phones/tablets have no Esc, Tab, Ctrl,
       arrows on the system keyboard — without these reminal is unusable
       for shell editing on mobile, which is the killer feature vs ssh. */
    #keybar {
      display: none;
      flex-wrap: wrap;
      gap: 4px;
      padding: 6px 8px;
      background: #161b22;
      border-top: 1px solid #21262d;
    }
    #keybar button {
      background: #21262d;
      color: #e6edf3;
      border: 1px solid #30363d;
      border-radius: 6px;
      padding: 8px 10px;
      font-family: Menlo, Monaco, "Courier New", monospace;
      font-size: 14px;
      font-weight: 500;
      min-width: 44px;   /* iOS HIG min tap target */
      min-height: 36px;
      cursor: pointer;
    }
    #keybar button:active { background: #30363d; }
    /* Touch devices and narrow screens get the bar; desktop with mouse hides it. */
    @media (pointer: coarse), (max-width: 720px) {
      #keybar { display: flex; }
    }

    /* Recent-sessions dropdown lives in the header next to the inputs. */
    #recents { position: relative; }
    #recents > summary {
      list-style: none;
      cursor: pointer;
      background: #21262d;
      border: 1px solid #30363d;
      border-radius: 6px;
      color: #e6edf3;
      font-size: 14px;
      padding: 6px 12px;
      user-select: none;
    }
    #recents > summary::-webkit-details-marker { display: none; }
    #recents > summary:hover { background: #30363d; }
    #recents[open] > summary { background: #30363d; }
    .recents-list {
      position: absolute;
      top: 100%;
      right: 0;
      margin-top: 4px;
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 6px;
      padding: 4px;
      min-width: 280px;
      max-width: 380px;
      z-index: 10;
      box-shadow: 0 6px 20px rgba(0, 0, 0, 0.5);
    }
    .recents-empty { padding: 12px; color: #8b949e; font-size: 13px; text-align: center; }
    .recents-row {
      display: flex; align-items: center; gap: 6px;
      padding: 6px 8px; border-radius: 4px;
      cursor: pointer; color: #e6edf3;
    }
    .recents-row:hover { background: #21262d; }
    .recents-row .label { flex: 1; min-width: 0; }
    .recents-row .name { font-size: 13px; font-weight: 500; }
    .recents-row .meta { font-size: 11px; color: #8b949e; font-family: monospace; }
    .recents-row .name.placeholder { color: #8b949e; font-style: italic; font-weight: 400; }
    .recents-row .row-btn {
      background: transparent; border: none; color: #8b949e;
      padding: 4px 6px; font-size: 13px; cursor: pointer; border-radius: 4px;
    }
    .recents-row .row-btn:hover { background: #30363d; color: #e6edf3; }
    /* When connected, the inputs collapse but the recents dropdown stays
       useful: rename the current session, hop to another one. */
  </style>
</head>
<body>
  <header>
    <h1><span>re</span>minal</h1>
    <div id="session-form">
      <details id="recents">
        <summary>Recent ▾</summary>
        <div class="recents-list" id="recents-list"></div>
      </details>
      <input id="session-input" placeholder="Session" maxlength="8" autocomplete="off" spellcheck="false">
      <input id="pin-input" placeholder="PIN" maxlength="8" inputmode="numeric" autocomplete="off" spellcheck="false">
      <button id="connect-btn">Connect</button>
    </div>
    <div id="status" class="">Session + PIN required</div>
  </header>
  <div id="terminal-wrap">
    <div id="terminal"></div>
    <div id="overlay"><span id="overlay-text">Connecting…</span></div>
  </div>
  <div id="keybar">
    <button data-key="esc">Esc</button>
    <button data-key="tab">Tab</button>
    <button data-key="ctrl-c">^C</button>
    <button data-key="ctrl-d">^D</button>
    <button data-key="ctrl-z">^Z</button>
    <button data-key="ctrl-l">^L</button>
    <button data-key="pipe">|</button>
    <button data-key="tilde">~</button>
    <button data-key="up">↑</button>
    <button data-key="down">↓</button>
    <button data-key="left">←</button>
    <button data-key="right">→</button>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/lib/xterm.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@xterm/addon-fit@0.10.0/lib/addon-fit.min.js"></script>
  <script>
    const statusEl = document.getElementById('status');
    const sessionInput = document.getElementById('session-input');
    const pinInput = document.getElementById('pin-input');
    const connectBtn = document.getElementById('connect-btn');
    const overlay = document.getElementById('overlay');
    const overlayText = document.getElementById('overlay-text');

    const params = new URLSearchParams(location.search);
    const initialSession = params.get('s') || '';
    if (initialSession) sessionInput.value = initialSession.toUpperCase();

    // The PIN may arrive in the URL fragment (e.g. #p=123456) from the
    // QR code printed by the agent. Fragments never leave the browser, so
    // this is safer than putting the PIN in the query string. We strip the
    // fragment from the URL bar after reading it.
    const hashParams = new URLSearchParams(location.hash.replace(/^#/, ''));
    let initialPin = hashParams.get('p') || '';
    if (initialPin) {
      pinInput.value = initialPin;
      history.replaceState(null, '', location.pathname + location.search);
    }

    // ---- Recent sessions history (localStorage, cross-tab, cross-session) ----
    // Each entry: { id, pin, name, lastSeen }. Capped at 10 most-recent so
    // the dropdown stays manageable. We keep PINs here knowingly — same
    // model as `sessionStorage` for the current session; user can clear
    // via the "Forget" button on any row.
    const HISTORY_KEY = 'reminal:history';
    const HISTORY_MAX = 10;
    function loadHistory() {
      try {
        const raw = localStorage.getItem(HISTORY_KEY);
        if (!raw) return [];
        const arr = JSON.parse(raw);
        return Array.isArray(arr) ? arr : [];
      } catch (_) { return []; }
    }
    function saveHistory(list) {
      try { localStorage.setItem(HISTORY_KEY, JSON.stringify(list)); } catch (_) {}
    }
    function rememberSession(id, pin) {
      if (!id || !pin) return;
      const list = loadHistory();
      const existingIdx = list.findIndex(e => e.id === id);
      const existing = existingIdx >= 0 ? list[existingIdx] : null;
      const entry = {
        id: id.toUpperCase(),
        pin: pin,
        name: existing?.name || '',
        lastSeen: Date.now(),
      };
      if (existingIdx >= 0) list.splice(existingIdx, 1);
      list.unshift(entry);
      saveHistory(list.slice(0, HISTORY_MAX));
      renderRecents();
    }
    function renameSession(id, name) {
      const list = loadHistory();
      const e = list.find(x => x.id === id);
      if (!e) return;
      e.name = name;
      saveHistory(list);
      renderRecents();
    }
    function forgetSession(id) {
      saveHistory(loadHistory().filter(e => e.id !== id));
      renderRecents();
    }
    function fmtAgo(ts) {
      const s = Math.floor((Date.now() - ts) / 1000);
      if (s < 60) return s + 's ago';
      if (s < 3600) return Math.floor(s / 60) + 'm ago';
      if (s < 86400) return Math.floor(s / 3600) + 'h ago';
      return Math.floor(s / 86400) + 'd ago';
    }
    function renderRecents() {
      const list = loadHistory();
      const root = document.getElementById('recents-list');
      if (!root) return;
      if (list.length === 0) {
        root.innerHTML = '<div class="recents-empty">No recent sessions yet — connect once and it\'ll show up here.</div>';
        return;
      }
      root.innerHTML = '';
      for (const e of list) {
        const row = document.createElement('div');
        row.className = 'recents-row';
        row.title = 'Click to connect';
        const label = document.createElement('div');
        label.className = 'label';
        const nameEl = document.createElement('div');
        nameEl.className = 'name' + (e.name ? '' : ' placeholder');
        nameEl.textContent = e.name || '(unnamed session)';
        const metaEl = document.createElement('div');
        metaEl.className = 'meta';
        metaEl.textContent = e.id + ' · ' + fmtAgo(e.lastSeen);
        label.appendChild(nameEl);
        label.appendChild(metaEl);
        const renameBtn = document.createElement('button');
        renameBtn.className = 'row-btn';
        renameBtn.title = 'Rename';
        renameBtn.textContent = '✎';
        renameBtn.addEventListener('click', (ev) => {
          ev.stopPropagation();
          const next = prompt('Name for ' + e.id + ':', e.name || '');
          if (next !== null) renameSession(e.id, next.trim());
        });
        const forgetBtn = document.createElement('button');
        forgetBtn.className = 'row-btn';
        forgetBtn.title = 'Forget this session';
        forgetBtn.textContent = '✕';
        forgetBtn.addEventListener('click', (ev) => {
          ev.stopPropagation();
          if (confirm('Forget ' + (e.name || e.id) + '?')) forgetSession(e.id);
        });
        row.appendChild(label);
        row.appendChild(renameBtn);
        row.appendChild(forgetBtn);
        row.addEventListener('click', () => {
          // Fill inputs and start a connection to this remembered session.
          sessionInput.value = e.id;
          pinInput.value = e.pin;
          document.getElementById('recents').open = false;
          if (sessionId && sessionId !== e.id) {
            // Switching to a different session — close the live one first
            // so its socket releases cleanly before we dial a new one.
            userDisconnect();
          }
          startConnect();
        });
        root.appendChild(row);
      }
    }

    // Restore the PIN from sessionStorage if we previously authed this same
    // session in this tab. Refresh now Just Works without re-prompting.
    // sessionStorage (vs localStorage) means the credential dies with the
    // tab, matching the user's intent — closing the tab is "I'm done."
    const CRED_KEY = 'reminal:cred';
    function loadStoredCred(sessionId) {
      if (!sessionId) return '';
      try {
        const raw = sessionStorage.getItem(CRED_KEY);
        if (!raw) return '';
        const c = JSON.parse(raw);
        if (c && c.session === sessionId.toUpperCase() && typeof c.pin === 'string') {
          return c.pin;
        }
      } catch (_) {}
      return '';
    }
    function saveCred(sessionId, pin) {
      try {
        sessionStorage.setItem(CRED_KEY, JSON.stringify({ session: sessionId.toUpperCase(), pin: pin }));
      } catch (_) {}
    }
    function clearCred() {
      try { sessionStorage.removeItem(CRED_KEY); } catch (_) {}
    }
    if (!initialPin) {
      const stored = loadStoredCred(initialSession);
      if (stored) {
        pinInput.value = stored;
        initialPin = stored;
      }
    }

    const term = new Terminal({
      cursorBlink: true,
      fontFamily: 'Menlo, Monaco, "Courier New", monospace',
      fontSize: 14,
      scrollback: 10000,
      theme: {
        background: '#0d1117', foreground: '#e6edf3', cursor: '#58a6ff',
        selectionBackground: '#264f78',
      },
    });
    const fitAddon = new FitAddon.FitAddon();
    term.loadAddon(fitAddon);
    term.open(document.getElementById('terminal'));
    fitAddon.fit();

    // Connection state machine
    let ws = null;
    let cryptoKey = null;
    let authed = false;       // received auth_ok
    let agentLive = false;    // agent is currently connected on the relay
    let lastSeq = 0;          // highest seq we've received from agent
    let sessionId = '';
    let pinValue = '';
    let manualClose = false;  // user clicked Disconnect; do not auto-reconnect
    let fatal = false;        // unrecoverable (bad PIN, session expired); do not auto-reconnect
    let reconnectTimer = null;
    let backoffMs = 1000;
    const MAX_BACKOFF_MS = 30000;
    let connectedAt = 0;
    // helloShown gates the one-time "Connected · AES-256-GCM end-to-end" line
    // written into the terminal; bytesSent/Received feed the summary line on
    // disconnect. Mirrors the terminal viewer's helloOnce + counters.
    let helloShown = false;
    let bytesSent = 0;
    let bytesReceived = 0;
    let lastDialMs = 0; // measured from new WebSocket() to ws.onopen

    function humanBytes(n) {
      if (n < 1000) return n + ' B';
      if (n < 1000000) return (n / 1000).toFixed(2) + ' KB';
      if (n < 1000000000) return (n / 1000000).toFixed(2) + ' MB';
      return (n / 1000000000).toFixed(2) + ' GB';
    }

    // humanDuration formats seconds as 47s / 8m32s / 1h12m. Matches the
    // Go time.Duration string output the terminal viewer uses.
    function humanDuration(secs) {
      if (secs < 60) return secs + 's';
      const m = Math.floor(secs / 60);
      const s = secs % 60;
      if (m < 60) return m + 'm' + (s > 0 ? s + 's' : '');
      const h = Math.floor(m / 60);
      const mm = m % 60;
      return h + 'h' + (mm > 0 ? mm + 'm' : '');
    }

    async function deriveKey(sessionId, pin) {
      const enc = new TextEncoder();
      const baseKey = await crypto.subtle.importKey(
        'raw', enc.encode(pin), 'HKDF', false, ['deriveBits']
      );
      const bits = await crypto.subtle.deriveBits(
        {
          name: 'HKDF',
          hash: 'SHA-256',
          salt: enc.encode(sessionId.toUpperCase()),
          info: enc.encode('reminal-v1'),
        },
        baseKey,
        256
      );
      return crypto.subtle.importKey('raw', bits, { name: 'AES-GCM' }, false, ['encrypt', 'decrypt']);
    }

    async function encrypt(key, data) {
      const bytes = typeof data === 'string' ? new TextEncoder().encode(data) : data;
      const nonce = crypto.getRandomValues(new Uint8Array(12));
      const ct = await crypto.subtle.encrypt({ name: 'AES-GCM', iv: nonce }, key, bytes);
      const out = new Uint8Array(nonce.length + ct.byteLength);
      out.set(nonce);
      out.set(new Uint8Array(ct), nonce.length);
      return btoa(String.fromCharCode(...out));
    }

    async function decrypt(key, encoded) {
      const raw = Uint8Array.from(atob(encoded), c => c.charCodeAt(0));
      const nonce = raw.slice(0, 12);
      const ct = raw.slice(12);
      const pt = await crypto.subtle.decrypt({ name: 'AES-GCM', iv: nonce }, key, ct);
      return new Uint8Array(pt);
    }

    function relayURL(sessionId) {
      const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
      return proto + '//' + location.host + '/ws/' + sessionId.toUpperCase() + '/viewer';
    }

    function setStatus(text, cls) {
      statusEl.textContent = text;
      statusEl.className = cls || '';
    }

    function showOverlay(text) {
      overlayText.textContent = text;
      overlay.classList.add('visible');
    }

    function hideOverlay() {
      overlay.classList.remove('visible');
    }

    function setBtnConnect() {
      connectBtn.textContent = 'Connect';
      connectBtn.disabled = false;
      connectBtn.classList.remove('danger');
      document.body.classList.remove('connected');
    }

    function setBtnDisconnect() {
      connectBtn.textContent = 'Disconnect';
      connectBtn.disabled = false;
      connectBtn.classList.add('danger');
      // Collapse the session/PIN inputs out of the header so the terminal
      // gets the freed vertical space (real estate is precious on phones).
      document.body.classList.add('connected');
    }

    function setBtnBusy(label) {
      connectBtn.textContent = label;
      connectBtn.disabled = true;
      connectBtn.classList.remove('danger');
    }

    async function send(msg) {
      if (!ws || ws.readyState !== WebSocket.OPEN) return;
      if (authed && cryptoKey && (msg.type === 'data' || msg.type === 'resize')) {
        if (msg.type === 'data') {
          msg = { type: 'data', data: await encrypt(cryptoKey, Uint8Array.from(atob(msg.data), c => c.charCodeAt(0))) };
        } else {
          const payload = JSON.stringify({ cols: msg.cols, rows: msg.rows });
          msg = { type: 'resize', data: await encrypt(cryptoKey, payload) };
        }
      }
      ws.send(JSON.stringify(msg));
    }

    function sendResize() {
      send({ type: 'resize', cols: term.cols, rows: term.rows });
    }

    function sendResume() {
      if (!ws || ws.readyState !== WebSocket.OPEN) return;
      ws.send(JSON.stringify({ type: 'resume', from_seq: lastSeq }));
    }

    function cancelReconnect() {
      if (reconnectTimer !== null) {
        clearTimeout(reconnectTimer);
        reconnectTimer = null;
      }
    }

    function scheduleReconnect() {
      cancelReconnect();
      if (manualClose || fatal) return;
      // Reset backoff if the previous session stayed up for a while.
      if (connectedAt && (Date.now() - connectedAt) > 30000) {
        backoffMs = 1000;
      }
      const delay = Math.min(backoffMs, MAX_BACKOFF_MS);
      const secs = Math.max(1, Math.round(delay / 1000));
      setStatus('Reconnecting in ' + secs + 's…', 'warn connecting');
      showOverlay('Reconnecting in ' + secs + 's…');
      reconnectTimer = setTimeout(() => {
        reconnectTimer = null;
        openSocket();
      }, delay);
      backoffMs = Math.min(backoffMs * 2, MAX_BACKOFF_MS);
    }

    async function startConnect() {
      const s = sessionInput.value.trim().toUpperCase();
      const p = pinInput.value.trim();
      if (!s || !p) { setStatus('Session and PIN required', 'error'); return; }
      if (!/^\d{6,8}$/.test(p)) { setStatus('PIN must be 6–8 digits', 'error'); return; }

      manualClose = false;
      fatal = false;
      backoffMs = 1000;
      // Switching to a different session invalidates the replay cursor and
      // any previously rendered output; start the terminal clean.
      if (s !== sessionId) {
        lastSeq = 0;
        sessionId = s;
        term.reset();
      }
      pinValue = p;
      cryptoKey = await deriveKey(sessionId, pinValue);
      sessionInput.value = sessionId;
      history.replaceState(null, '', '?s=' + sessionId);
      openSocket();
    }

    function openSocket() {
      cancelReconnect();
      if (ws) { try { ws.close(); } catch (_) {} ws = null; }
      authed = false;
      agentLive = false;

      const fresh = lastSeq === 0;
      setStatus(fresh ? 'Connecting…' : 'Reconnecting…', 'warn connecting');
      showOverlay(fresh ? 'Connecting…' : 'Reconnecting…');
      setBtnBusy('Cancel');
      // Allow user to cancel during connect by re-purposing the button.
      connectBtn.disabled = false;
      connectBtn.classList.add('danger');
      connectBtn.textContent = 'Cancel';

      const dialStart = Date.now();
      ws = new WebSocket(relayURL(sessionId));

      ws.onopen = () => {
        // Stash for the one-time "Connected · handshake Xms" line below.
        lastDialMs = Date.now() - dialStart;
        ws.send(JSON.stringify({ type: 'auth', pin: pinValue }));
      };

      ws.onmessage = async (ev) => {
        let msg;
        try { msg = JSON.parse(ev.data); } catch { return; }
        await handleMessage(msg);
      };

      ws.onclose = () => {
        authed = false;
        agentLive = false;
        ws = null;
        if (manualClose) {
          setStatus('Disconnected');
          hideOverlay();
          setBtnConnect();
          return;
        }
        if (fatal) {
          // Status already set by error handler.
          hideOverlay();
          setBtnConnect();
          return;
        }
        scheduleReconnect();
      };

      ws.onerror = () => {
        // ws.onclose will run after this; let it drive reconnect logic.
      };
    }

    async function handleMessage(msg) {
      switch (msg.type) {
        case 'auth_ok':
          authed = true;
          // Auth succeeded — remember the PIN for this tab so a refresh
          // doesn't bounce the user back to the login form.
          saveCred(sessionId, pinValue);
          // Also add to the persistent localStorage history so the user
          // can pick this session from the Recent dropdown later.
          rememberSession(sessionId, pinValue);
          break;
        case 'connected':
        case 'agent_online':
          agentLive = true;
          connectedAt = Date.now();
          backoffMs = 1000;
          setStatus('Connected to ' + sessionId, 'connected');
          hideOverlay();
          setBtnDisconnect();
          if (!helloShown) {
            helloShown = true;
            const ht = lastDialMs > 0 ? ' · handshake ' + lastDialMs + 'ms' : '';
            term.write('\x1b[2m[reminal] Connected to ' + sessionId + ht + ' · AES-256-GCM end-to-end\x1b[0m\r\n');
          }
          sendResume();
          fitAddon.fit();
          sendResize();
          term.focus();
          break;
        case 'agent_offline':
          agentLive = false;
          setStatus('Agent offline — waiting…', 'warn connecting');
          showOverlay('Agent offline — waiting for it to reconnect…');
          // Keep the WS open; the relay will tell us when the agent is back.
          setBtnDisconnect();
          break;
        case 'data': {
          if (!cryptoKey) break;
          try {
            const bytes = await decrypt(cryptoKey, msg.data);
            if (typeof msg.seq === 'number' && msg.seq > lastSeq) lastSeq = msg.seq;
            term.write(bytes);
            bytesReceived += bytes.byteLength;
          } catch (_) { /* decrypt failure: skip */ }
          break;
        }
        case 'closed':
          fatal = true;
          clearCred();
          setStatus(msg.error || 'Session ended', 'error');
          term.write('\r\n\x1b[31m' + (msg.error || 'Session ended') + '\x1b[0m\r\n');
          break;
        case 'error':
          fatal = true;
          clearCred();
          setStatus(msg.error || 'Error', 'error');
          term.write('\r\n\x1b[31m' + (msg.error || 'Error') + '\x1b[0m\r\n');
          break;
      }
    }

    function userDisconnect() {
      manualClose = true;
      cancelReconnect();
      clearCred();
      if (ws) { try { ws.close(); } catch (_) {} ws = null; }
      authed = false;
      agentLive = false;
      if (helloShown && connectedAt) {
        const dur = Math.max(1, Math.round((Date.now() - connectedAt) / 1000));
        term.write('\x1b[2m[reminal] Disconnected from ' + sessionId + ' after ' + humanDuration(dur) + ' · sent ' + humanBytes(bytesSent) + ' · received ' + humanBytes(bytesReceived) + '\x1b[0m\r\n');
      }
      setStatus('Disconnected');
      hideOverlay();
      setBtnConnect();
    }

    // Serialize all outbound keystrokes/keybar presses into a single chain.
    // Without this, two fast onData calls would each `await encrypt()` in
    // parallel and the Web Crypto API doesn't guarantee promise-resolution
    // order matches call order — so the bytes could land on the WS in the
    // wrong sequence and the remote shell would see e.g. "clra" instead of
    // "clear", running a bogus prefix as a command and leaving "ar" typed
    // at the resulting prompt.
    let sendChain = Promise.resolve();
    async function sendInput(data) {
      if (!agentLive) return; // typing into nothing while agent is offline
      const result = sendChain.then(async () => {
        const bytes = new TextEncoder().encode(data);
        let binary = '';
        bytes.forEach(b => binary += String.fromCharCode(b));
        await send({ type: 'data', data: btoa(binary) });
        bytesSent += bytes.byteLength;
      });
      sendChain = result.catch(() => {}); // keep chain alive on errors
      return result;
    }
    term.onData(sendInput);

    // Mobile soft-key map. Values are the literal byte sequences the
    // remote shell expects — same as what xterm.js would emit for the
    // matching keypress on a hardware keyboard.
    const keyMap = {
      esc:    '\x1b',
      tab:    '\t',
      'ctrl-c': '\x03',
      'ctrl-d': '\x04',
      'ctrl-z': '\x1a',
      'ctrl-l': '\x0c',
      pipe:   '|',
      tilde:  '~',
      up:     '\x1b[A',
      down:   '\x1b[B',
      right:  '\x1b[C',
      left:   '\x1b[D',
    };
    // Tab close / page hide: send a clean WebSocket close frame so the relay
    // sees us go away immediately, instead of waiting for TCP keepalive /
    // read-deadline to time out. Without this, the agent would think this
    // viewer was still attached for tens of seconds after the user closed
    // the tab — wrong viewer count on the host, late "viewer disconnected"
    // line. pagehide is the reliable signal on mobile Safari where
    // beforeunload often doesn't fire.
    function gracefulClose() {
      if (ws && ws.readyState === WebSocket.OPEN) {
        try { ws.close(1000, 'page closed'); } catch (_) {}
      }
    }
    window.addEventListener('pagehide', gracefulClose);
    window.addEventListener('beforeunload', gracefulClose);

    document.querySelectorAll('#keybar button').forEach(btn => {
      btn.addEventListener('click', async () => {
        const seq = keyMap[btn.dataset.key];
        if (seq) await sendInput(seq);
        term.focus();
      });
    });

    const refit = () => { fitAddon.fit(); if (agentLive) sendResize(); };
    window.addEventListener('resize', refit);
    // iOS doesn't fire window.resize when the soft keyboard pops, leaving
    // xterm.js sized to the full viewport while half of it is covered.
    // visualViewport fires for keyboard show/hide, URL bar collapse, etc.
    if (window.visualViewport) {
      window.visualViewport.addEventListener('resize', refit);
    }
    connectBtn.addEventListener('click', () => {
      // Three button modes:
      //   - "Connect" (idle/disconnected): start a new connection
      //   - "Cancel" (connecting/reconnecting): abort and stay disconnected
      //   - "Disconnect" (connected): manually close
      if (!ws && !reconnectTimer) {
        startConnect();
      } else {
        userDisconnect();
      }
    });
    sessionInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') startConnect(); });
    pinInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') startConnect(); });

    // Populate the Recent dropdown on load so the user sees their saved
    // sessions even before clicking it.
    renderRecents();

    // If the QR code provided both session and PIN, just connect.
    if (initialSession && initialPin) {
      startConnect();
    } else if (initialSession) {
      pinInput.focus();
    }

    // If the page is closed/refreshed, close the WS cleanly.
    window.addEventListener('beforeunload', () => {
      manualClose = true;
      if (ws) try { ws.close(); } catch (_) {}
    });
  </script>
</body>
</html>
